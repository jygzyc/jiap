name: Build Decx

on:
  push:
    branches: [ main ]
    paths:
      - 'decx/**'
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'decx/**'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Extract version from git tag
      id: version
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Found version from tag: $VERSION"

    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build with Gradle
      run: ./gradlew dist
      working-directory: decx
      env:
        DECX_VERSION: ${{ steps.version.outputs.version }}

    - name: Prepare release files
      run: |
        cp decx/build/dist/*.jar ./
        ls -la *.jar

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        files: |
          *.jar
        body_path: RELEASE.md
        draft: false
        prerelease: false
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prerelease:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Generate prerelease version
      id: version
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null | sed 's/^v//')
        LATEST_TAG="${LATEST_TAG:-0.0.0}"
        TIMESTAMP=$(date +%s)
        echo "version=${LATEST_TAG}-${TIMESTAMP}" >> $GITHUB_OUTPUT
        echo "Prerelease version: ${LATEST_TAG}-${TIMESTAMP}"

    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build with Gradle
      run: ./gradlew dist
      working-directory: decx
      env:
        DECX_VERSION: ${{ steps.version.outputs.version }}

    - name: Prepare release files
      run: |
        cp decx/build/dist/*.jar ./
        ls -la *.jar

    - name: Delete old prereleases
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh api "repos/{owner}/{repo}/releases" \
          --jq '.[] | select(.prerelease) | .tag_name' \
        | xargs -r -I {} gh release delete "{}" --cleanup-tag --yes

    - name: Create Prerelease
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "prerelease-${{ steps.version.outputs.version }}"
        name: "Prerelease ${{ steps.version.outputs.version }}"
        files: |
          *.jar
        draft: false
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
