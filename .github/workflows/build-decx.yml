name: Build Decx

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'decx/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Extract version from git tag
      id: version
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Found version from tag: $VERSION"

    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build with Gradle
      run: ./gradlew dist
      working-directory: decx
      env:
        DECX_VERSION: ${{ steps.version.outputs.version }}

    - name: Verify release artifacts
      run: |
        ls -la decx/build/dist/
        test -f "decx/build/dist/jadx_decx_plugin-${{ steps.version.outputs.version }}.jar"
        test -f "decx/build/dist/decx-server-${{ steps.version.outputs.version }}.jar"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        files: |
          decx/build/dist/*.jar
        body_path: RELEASE.md
        draft: false
        prerelease: false
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prerelease:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check for decx changes
      id: changes
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Manual run requested from main; forcing prerelease build"
          exit 0
        fi

        BASE_SHA="${{ github.event.before }}"
        HEAD_SHA="${{ github.sha }}"

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          FILES=$(git diff-tree --no-commit-id --name-only -r "$HEAD_SHA")
        else
          FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
        fi

        if echo "$FILES" | grep -q '^decx/'; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate prerelease version
      if: steps.changes.outputs.has_changes == 'true'
      id: version
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null | sed 's/^v//')
        LATEST_TAG="${LATEST_TAG:-0.0.0}"
        TIMESTAMP=$(date +%s)
        echo "version=${LATEST_TAG}-${TIMESTAMP}" >> $GITHUB_OUTPUT
        echo "Prerelease version: ${LATEST_TAG}-${TIMESTAMP}"

    - name: Set up JDK 11
      if: steps.changes.outputs.has_changes == 'true'
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      if: steps.changes.outputs.has_changes == 'true'
      uses: gradle/actions/setup-gradle@v6

    - name: Build with Gradle
      if: steps.changes.outputs.has_changes == 'true'
      run: ./gradlew dist
      working-directory: decx
      env:
        DECX_VERSION: ${{ steps.version.outputs.version }}

    - name: Prepare prerelease files
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        cp decx/build/dist/*.jar ./
        ls -la *.jar

    - name: Delete old prereleases
      if: steps.changes.outputs.has_changes == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh api "repos/{owner}/{repo}/releases" \
          --jq '.[] | select(.prerelease) | .tag_name' \
        | xargs -r -I {} gh release delete "{}" --cleanup-tag --yes

    - name: Create Prerelease
      if: steps.changes.outputs.has_changes == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "prerelease-${{ steps.version.outputs.version }}"
        name: "Prerelease ${{ steps.version.outputs.version }}"
        files: |
          *.jar
        draft: false
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
